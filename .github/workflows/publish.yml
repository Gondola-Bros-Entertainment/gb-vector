name: Publish

on:
  push:
    tags: ['v*']

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: CI
    uses: ./.github/workflows/ci.yml

  publish:
    name: Publish to Hackage
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify version matches tag
        run: |
          TAG_VERSION=${GITHUB_REF#refs/tags/v}
          CABAL_VERSION=$(sed -n 's/^version:[[:space:]]*//p' gb-vector.cabal)
          if [ "$TAG_VERSION" != "$CABAL_VERSION" ]; then
            echo "ERROR: Tag v$TAG_VERSION does not match cabal version $CABAL_VERSION"
            echo "Bump the version in gb-vector.cabal before tagging."
            exit 1
          fi
      - uses: haskell-actions/setup@v2
        with:
          ghc-version: '9.8'
          cabal-version: 'latest'
      - run: cabal sdist
      - name: Upload to Hackage
        run: |
          SDIST=$(ls dist-newstyle/sdist/gb-vector-*.tar.gz)
          curl --fail --silent --show-error \
            --header "Authorization: X-ApiKey ${HACKAGE_TOKEN}" \
            --form "package=@${SDIST}" \
            https://hackage.haskell.org/packages/
        env:
          HACKAGE_TOKEN: ${{ secrets.HACKAGE_TOKEN }}
